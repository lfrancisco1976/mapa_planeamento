<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planeamento Transportes EGEO</title>
  <style>
    :root {
      --primary: #2b7a78; --primary-dark: #205f5c; --bg: #f4f6f8;
      --card-bg: #ffffff; --shadow: 0 4px 12px rgba(0,0,0,0.1);
      --basc: #e6f7ff; --cis: #fff5e6; --semi: #f3e6ff;
    }
    body { margin: 0; font-family: "Segoe UI", sans-serif; background: var(--bg); color: #333; }
    header { background: var(--primary); color: white; padding: 20px; text-align: center; font-size: 1.5rem; font-weight: 600; box-shadow: var(--shadow); }
    .controls { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin: 15px; }
    button, select, input[type="date"] { padding: 10px 16px; border: none; border-radius: 8px; background: var(--primary); color: white; cursor: pointer; }
    select, input[type="date"] { background: #fff; color: #333; border: 1px solid #ccc; }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    .date-title { font-size: 1.3rem; font-weight: 600; color: var(--primary-dark); margin-bottom: 15px; border-left: 5px solid var(--primary); padding-left: 10px; }
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; }
    .card { border-radius: 12px; padding: 15px; box-shadow: var(--shadow); display: flex; flex-direction: column; gap: 5px; }
    .card-header { font-weight: bold; color: var(--primary); font-size: 1.1rem; border-bottom: 1px solid rgba(0,0,0,0.05); padding-bottom: 5px; }
    .card-row { font-size: 0.9rem; }
    .tag { font-weight: bold; color: #555; }
    .loading { text-align: center; margin: 40px; font-weight: bold; }
  </style>
</head>
<body>

<header>Planeamento Transportes EGEO</header>

<div class="controls">
  <button onclick="changeDate(-1)">◀ Anterior</button>
  <button onclick="today()">Hoje</button>
  <button onclick="changeDate(1)">Seguinte ▶</button>
  <button onclick="loadData()">🔄 Atualizar</button>
  <input type="date" id="datePicker" onchange="pickDate(this.value)">
  <select id="filterViatura" onchange="renderData()"><option value="">Todas as Viaturas</option></select>
  <select id="filterTransportador" onchange="renderData()"><option value="">Todos os Transportadores</option></select>
</div>

<div id="loading" class="loading" style="display:none;">A carregar dados...</div>
<div class="container" id="dataContainer"></div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbwdzZHBbTCdhyXLCXNKaUlHz9X4-MfWqQUDdYt9ETgRQJfe--ePwYDIqvlcKGsMFSM/exec"; // COLA AQUI O URL DA IMPLEMENTAÇÃO
  let allData = [];
  let currentDate = new Date();

  // Converte DD/MM/YYYY ou Datas ISO para YYYY-MM-DD local
  function toLocalISO(dateInput) {
    if (!dateInput) return "";
    let d;
    if (typeof dateInput === 'string' && dateInput.includes('/')) {
      const [day, month, year] = dateInput.split('/');
      d = new Date(year, month - 1, day);
    } else {
      d = new Date(dateInput);
    }
    if (isNaN(d.getTime())) return "";
    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
  }

  async function loadData() {
    document.getElementById("loading").style.display = "block";
    try {
      const res = await fetch(API_URL);
      allData = await res.json();
      fillFilters();
      renderData();
    } catch (e) {
      document.getElementById("dataContainer").innerHTML = "Erro ao carregar dados.";
    }
    document.getElementById("loading").style.display = "none";
  }

  function fillFilters() {
    const viaturas = [...new Set(allData.map(i => i["Tipo viatura"]))].filter(Boolean).sort();
    const trans = [...new Set(allData.map(i => i["Transportador"]))].filter(Boolean).sort();
    
    let vHtml = '<option value="">Todas as Viaturas</option>';
    viaturas.forEach(v => vHtml += `<option value="${v}">${v}</option>`);
    document.getElementById("filterViatura").innerHTML = vHtml;

    let tHtml = '<option value="">Todos os Transportadores</option>';
    trans.forEach(t => tHtml += `<option value="${t}">${t}</option>`);
    document.getElementById("filterTransportador").innerHTML = tHtml;
  }

  function renderData() {
    const container = document.getElementById("dataContainer");
    container.innerHTML = "";
    
    const targetDate = toLocalISO(currentDate);
    const selV = document.getElementById("filterViatura").value;
    const selT = document.getElementById("filterTransportador").value;

    const filtered = allData.filter(row => {
      // Nota: Usei "Data Carga" com C maiúsculo conforme a sua lista
      return toLocalISO(row["Data Carga"]) === targetDate &&
             (!selV || row["Tipo viatura"] === selV) &&
             (!selT || row["Transportador"] === selT);
    });

    if (filtered.length === 0) {
      container.innerHTML = `<p style="text-align:center">Sem registos para ${targetDate}</p>`;
      return;
    }

    const title = document.createElement("div");
    title.className = "date-title";
    title.innerText = `${targetDate} — ${filtered.length} Transporte(s)`;
    container.appendChild(title);

    const grid = document.createElement("div");
    grid.className = "cards";

    filtered.forEach(row => {
      const card = document.createElement("div");
      card.className = "card";
      
      // Cores por tipo
      const tipo = (row["Tipo viatura"] || "").toUpperCase();
      if (tipo.includes("BASC")) card.style.background = "var(--basc)";
      else if (tipo.includes("CIST")) card.style.background = "var(--cis)";
      else if (tipo.includes("SEMI")) card.style.background = "var(--semi)";

      card.innerHTML = `
        <div class="card-header">${row["Cliente"] || "N/A"}</div>
        <div class="card-row"><span class="tag">NEI:</span> ${row["NEI EGEO"] || "-"}</div>
        <div class="card-row"><span class="tag">Transp:</span> ${row["Transportador"] || "-"}</div>
        <div class="card-row"><span class="tag">Viatura:</span> ${row["Tipo viatura"] || "-"}</div>
        <div class="card-row"><em>${row["Designação"] || ""}</em></div>
        <div class="card-row"><span class="tag">Destino:</span> <strong>${row["Destino"] || "-"}</strong></div>
        <div class="card-row" style="margin-top:5px; font-size:0.8rem; opacity:0.8;">Descarga: ${row["Data Descarga"] || "-"}</div>
      `;
      grid.appendChild(card);
    });
    container.appendChild(grid);
  }

  function changeDate(n) { currentDate.setDate(currentDate.getDate() + n); updateUI(); }
  function today() { currentDate = new Date(); updateUI(); }
  function pickDate(v) { if(v) { const [y,m,d] = v.split("-"); currentDate = new Date(y, m-1, d); renderData(); } }
  function updateUI() { 
    document.getElementById("datePicker").value = toLocalISO(currentDate);
    renderData();
  }

  document.addEventListener("DOMContentLoaded", () => {
    updateUI();
    loadData();
  });
</script>
</body>
</html>
