<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planeamento EGEO</title>
  <style>
    :root {
      --primary: #2b7a78; --bg: #f4f7f6; --white: #ffffff;
      --basc: #e6f7ff; --cis: #fff5e6; --semi: #f3e6ff;
    }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding-bottom: 50px; }
    header { background: var(--primary); color: white; padding: 20px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    
    .controls { 
      display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; 
      padding: 15px; background: var(--white); border-bottom: 1px solid #ddd;
      position: sticky; top: 0; z-index: 100;
    }
    button, select, input { padding: 10px 15px; border-radius: 6px; border: 1px solid #ccc; font-size: 14px; cursor: pointer; }
    button { background: var(--primary); color: white; border: none; font-weight: bold; }
    
    .container { max-width: 1200px; margin: 20px auto; padding: 0 15px; }
    .status-bar { margin-bottom: 15px; font-weight: bold; color: var(--primary); }
    
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
    .card { 
      background: var(--white); border-radius: 8px; padding: 15px; 
      box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; flex-direction: column; 
      border-left: 10px solid #ccc;
    }
    .card-title { font-weight: bold; font-size: 1rem; margin-bottom: 10px; color: #111; line-height: 1.2; }
    .card-info { font-size: 0.9rem; margin: 3px 0; color: #444; }
    .label { font-weight: 700; color: #777; width: 100px; display: inline-block; }

    #loading { text-align: center; padding: 40px; }
    .spinner { width: 60px; animation: rotate 2s linear infinite; }
    @keyframes rotate { 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>Logística EGEO - Planeamento</header>

<div class="controls">
  <button onclick="changeDate(-1)">◀ Anterior</button>
  <input type="date" id="datePicker" onchange="render()">
  <button onclick="changeDate(1)">Seguinte ▶</button>
  <select id="filterTransp" onchange="render()"><option value="">Todos Transportadores</option></select>
  <button onclick="fetchData()" style="background:#444">🔄</button>
</div>

<div class="container">
  <div id="loading">
    <img src="logo.png" class="spinner" alt="Loading...">
    <p>A carregar dados do Sheets...</p>
  </div>
  <div id="statusBar" class="status-bar"></div>
  <div id="output" class="grid"></div>
</div>

<script>
  // ATUALIZA COM O TEU URL /EXEC
  const API_URL = "https://script.google.com/macros/s/AKfycbxgCwosIROsUEiNBH6rzzaHVn8WHmthgeA9lIFgiquHOKXnDpsUwysumSrz45oYlzOy/exec";
  let rawData = [];

  // Inicializa com a data de hoje para o seletor
  document.getElementById('datePicker').valueAsDate = new Date();

  async function fetchData() {
    document.getElementById('loading').style.display = 'block';
    try {
      const resp = await fetch(API_URL);
      rawData = await resp.json();
      
      // Preencher filtro de transportadores
      const transps = [...new Set(rawData.map(row => row["transportador"]))].filter(Boolean).sort();
      const select = document.getElementById('filterTransp');
      select.innerHTML = '<option value="">Todos Transportadores</option>';
      transps.forEach(t => select.innerHTML += `<option value="${t}">${t}</option>`);
      
      render();
    } catch (e) {
      document.getElementById('output').innerHTML = "Erro ao carregar dados.";
    }
    document.getElementById('loading').style.display = 'none';
  }

  function normalize(dateStr) {
    if (!dateStr) return "";
    // Se vier DD/MM/YYYY HH:MM:SS, pega só a parte da data
    const part = dateStr.split(' ')[0];
    if (part.includes('/')) {
      const [d, m, y] = part.split('/');
      return `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
    }
    return part;
  }

  function render() {
    const container = document.getElementById('output');
    const targetDate = document.getElementById('datePicker').value;
    const transp = document.getElementById('filterTransp').value;
    container.innerHTML = "";

    const filtered = rawData.filter(row => {
      // Como o script agora coloca tudo em minúsculas, usamos "data carga"
      const rowDate = normalize(row["data carga"]);
      const matchDate = rowDate === targetDate;
      const matchTransp = !transp || row["transportador"] === transp;
      return matchDate && matchTransp;
    });

    document.getElementById('statusBar').innerText = `${filtered.length} serviços encontrados.`;

    if (filtered.length === 0) {
      container.innerHTML = "<p>Sem dados para este dia.</p>";
      return;
    }

    filtered.forEach(row => {
      const card = document.createElement('div');
      card.className = 'card';
      
      // Cores por tipo
      const tipo = (row["tipo viatura"] || "").toUpperCase();
      if (tipo.includes("BASC")) card.style.borderColor = "#2b7a78", card.style.background = "var(--basc)";
      else if (tipo.includes("CIST")) card.style.borderColor = "#d9a044", card.style.background = "var(--cis)";
      else if (tipo.includes("SEMI")) card.style.borderColor = "#8e44ad", card.style.background = "var(--semi)";

      card.innerHTML = `
        <div class="card-title">${row["cliente"] || 'N/A'}</div>
        <div class="card-info"><span class="label">NEI:</span>${row["nei egeo"] || '-'}</div>
        <div class="card-info"><span class="label">Transport.:</span><strong>${row["transportador"] || '-'}</strong></div>
        <div class="card-info"><span class="label">Viatura:</span>${row["tipo viatura"] || '-'}</div>
        <div class="card-info"><span class="label">Designação:</span><em>${row["designação"] || '-'}</em></div>
        <div class="card-info" style="margin-top:8px; font-weight:bold; color:var(--primary)">
          <span class="label">Destino:</span>${row["destino"] || '-'}
        </div>
        <div style="font-size:0.75rem; color:#888; margin-top:10px; border-top:1px solid #eee; padding-top:5px;">
          Data Descarga: ${row["data descarga"] || '-'}
        </div>
      `;
      container.appendChild(card);
    });
  }

  function changeDate(days) {
    const picker = document.getElementById('datePicker');
    const d = new Date(picker.value);
    d.setDate(d.getDate() + days);
    picker.value = d.toISOString().split('T')[0];
    render();
  }

  fetchData();
</script>
</body>
</html>
