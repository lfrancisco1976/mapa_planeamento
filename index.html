<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planeamento Transportes</title>

<style>
:root {
  --primary:#2b7a78;
  --bg:#f4f6f8;
  --shadow:0 4px 12px rgba(0,0,0,0.1);
  --basc:#e6f7ff;
  --cis:#fff5e6;
  --semi:#f3e6ff;
}

body {margin:0;font-family:Segoe UI;background:var(--bg);}
header {background:var(--primary);color:#fff;padding:20px;text-align:center;}

.controls {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
  margin:15px;
}

button,select,input {
  padding:10px;
  border-radius:8px;
  font-size:0.9rem;
}

button {
  background:var(--primary);
  color:white;
  border:none;
  cursor:pointer;
}

.container {
  max-width:1200px;
  margin:auto;
  padding:20px;
}

.cards {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:15px;
}

.card {
  border-radius:12px;
  padding:15px;
  box-shadow:var(--shadow);
}

.loading {
  text-align:center;
  margin:40px;
}
</style>
</head>

<body>

<header>Planeamento Transportes</header>

<div class="controls">
  <button onclick="changeDate(-1)">◀</button>
  <button onclick="today()">Hoje</button>
  <button onclick="changeDate(1)">▶</button>
  <button onclick="loadData()">🔄</button>

  <input type="date" id="datePicker" onchange="pickDate(this.value)">

  <select id="filterViatura" onchange="renderData()">
    <option value="">Todas viaturas</option>
  </select>

  <select id="filterTransportador" onchange="renderData()">
    <option value="">Todos transportadores</option>
  </select>
</div>

<div class="container" id="dataContainer"></div>

<div class="loading" id="loading" style="display:none;">
  <p>A carregar...</p>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzj65xTfjr0VF8PawiIMY6OfTl-OSPM_SXZGAH-2WroDYsSeQNNNFxa41MonL5g_93h/exec";

let allData = [];
let currentDate = new Date();

/* 🔥 normalizar chave */
function cleanKey(k){
  return (k||"")
    .toString()
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"")
    .replace(/\s+/g," ")
    .trim();
}

/* 🔥 parse data (remove hora) */
function parseDate(str){
  if(!str) return null;

  str = str.toString().split(" ")[0];

  if(str.includes("/")){
    const [d,m,y] = str.split("/");
    return new Date(y, m-1, d);
  }

  return new Date(str);
}

/* data local */
function toLocalDateString(d){
  return d.getFullYear()+"-"+
    String(d.getMonth()+1).padStart(2,"0")+"-"+
    String(d.getDate()).padStart(2,"0");
}

function norm(v){
  return (v||"").toString().toLowerCase().trim();
}

function showLoading(s){
  document.getElementById("loading").style.display = s?"block":"none";
}

async function loadData(){
  showLoading(true);

  try{
    const res = await fetch(API_URL);
    const raw = await res.json();

    /* normalizar dados */
    allData = raw.map(row=>{
      let r={};
      Object.keys(row).forEach(k=>{
        r[cleanKey(k)] = row[k];
      });
      return r;
    });

    console.log("EXEMPLO:", allData[0]);

    fillFilters();
    renderData();

  }catch(e){
    document.getElementById("dataContainer").innerHTML="Erro ao carregar dados";
  }

  showLoading(false);
}

function fillFilters(){
  const viaturas = [...new Set(allData.map(i=>norm(i["tipo viatura"])).filter(Boolean))];
  const transps = [...new Set(allData.map(i=>norm(i["transportador"])).filter(Boolean))];

  const sv = document.getElementById("filterViatura");
  const st = document.getElementById("filterTransportador");

  sv.innerHTML='<option value="">Todas</option>';
  st.innerHTML='<option value="">Todos</option>';

  viaturas.forEach(v=>sv.innerHTML+=`<option value="${v}">${v}</option>`);
  transps.forEach(t=>st.innerHTML+=`<option value="${t}">${t}</option>`);
}

function renderData(){

  const container = document.getElementById("dataContainer");
  container.innerHTML="";

  const selV = norm(document.getElementById("filterViatura").value);
  const selT = norm(document.getElementById("filterTransportador").value);

  const todayStr = toLocalDateString(currentDate);

  const filtered = allData.filter(row=>{
    const d = parseDate(row["data carga"]);
    if(!d) return false;

    return (
      toLocalDateString(d) === todayStr &&
      (!selV || norm(row["tipo viatura"])===selV) &&
      (!selT || norm(row["transportador"])===selT)
    );
  });

  console.log("DATA:", todayStr, "RESULTADOS:", filtered.length);

  if(!filtered.length){
    container.innerHTML="<p style='text-align:center'>Nenhum transporte para esta data</p>";
    return;
  }

  const cards = document.createElement("div");
  cards.className="cards";

  filtered.forEach(r=>{
    const c=document.createElement("div");
    c.className="card";

    const tipo = norm(r["tipo viatura"]);

    if(tipo==="basculante") c.style.background="var(--basc)";
    if(tipo==="cisterna") c.style.background="var(--cis)";
    if(tipo==="semi-reboque") c.style.background="var(--semi)";

    c.innerHTML=`
      <b>${r["cliente"]||""}</b><br>
      ${r["transportador"]||""}<br>
      ${r["tipo viatura"]||""}<br>
      ${r["designacao"]||""}<br>
      Descarga: ${r["data descarga"]||""}<br>
      <b>${r["destino"]||""}</b>
    `;

    cards.appendChild(c);
  });

  container.appendChild(cards);
}

/* controlos */
function changeDate(d){
  currentDate.setDate(currentDate.getDate()+d);
  document.getElementById("datePicker").value = toLocalDateString(currentDate);
  renderData();
}

function today(){
  currentDate = new Date();
  document.getElementById("datePicker").value = toLocalDateString(currentDate);
  renderData();
}

function pickDate(v){
  if(!v) return;
  const [y,m,d]=v.split("-");
  currentDate=new Date(y,m-1,d);
  renderData();
}

document.addEventListener("DOMContentLoaded", ()=>{
  document.getElementById("datePicker").value = toLocalDateString(currentDate);
  loadData();
});
</script>

</body>
</html>
