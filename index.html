<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planeamento Transportes EGEO</title>

<style>
:root {
  --primary: #2b7a78;
  --primary-dark: #205f5c;
  --bg: #f4f6f8;
  --shadow: 0 4px 12px rgba(0,0,0,0.1);
  --basc: #e6f7ff;
  --cis: #fff5e6;
  --semi: #f3e6ff;
}

body { margin:0; font-family:Segoe UI; background:var(--bg); }

header {
  background:var(--primary);
  color:#fff;
  padding:20px;
  text-align:center;
  font-size:1.5rem;
}

.controls {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
  margin:15px;
}

button, select, input {
  padding:10px;
  border-radius:8px;
  font-size:0.9rem;
}

button {
  background:var(--primary);
  color:white;
  border:none;
  cursor:pointer;
}

.container { max-width:1200px; margin:auto; padding:20px; }

.cards {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:15px;
}

.card {
  border-radius:12px;
  padding:15px;
  box-shadow:var(--shadow);
}

.loading { text-align:center; margin:40px; }

.loading img {
  width:60px;
  animation:spin 2s linear infinite;
}

@keyframes spin {
  from {transform:rotate(0deg);}
  to {transform:rotate(360deg);}
}
</style>
</head>

<body>

<header>Planeamento Transportes EGEO</header>

<div class="controls">
  <button onclick="changeDate(-1)">◀</button>
  <button onclick="today()">Hoje</button>
  <button onclick="changeDate(1)">▶</button>
  <button onclick="loadData()">🔄</button>

  <input type="date" id="datePicker" onchange="pickDate(this.value)">

  <select id="filterViatura" onchange="renderData()">
    <option value="">Todas viaturas</option>
  </select>

  <select id="filterTransportador" onchange="renderData()">
    <option value="">Todos transportadores</option>
  </select>
</div>

<div class="container" id="dataContainer"></div>

<div class="loading" id="loading" style="display:none;">
  <img src="logo.png">
  <p>A carregar...</p>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbydj-7yUQ9j7b4SMOAawbZU8GKLb_J4gau6ZAzdYZr6IRP_laZN5-HjBCYR_1y1YRk/exec";

let allData = [];
let currentDate = new Date();

/* ✅ normalizar texto */
function norm(txt) {
  return (txt || "").toString().trim().toLowerCase();
}

/* ✅ parse data LOCAL */
function parseDate(str) {
  if (!str) return null;

  if (typeof str === "string" && str.includes("/")) {
    const [d,m,y] = str.split("/");
    return new Date(y, m-1, d);
  }

  return new Date(str);
}

/* ✅ YYYY-MM-DD local */
function toLocalDateString(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth()+1).padStart(2,"0");
  const d = String(date.getDate()).padStart(2,"0");
  return `${y}-${m}-${d}`;
}

function showLoading(s) {
  document.getElementById("loading").style.display = s ? "block":"none";
}

async function loadData() {
  showLoading(true);

  try {
    const res = await fetch(API_URL);
    let raw = await res.json();

    /* 🔥 NORMALIZA COLUNAS */
    allData = raw.map(row => {
      let r = {};
      Object.keys(row).forEach(k => {
        r[norm(k)] = row[k];
      });
      return r;
    });

    console.log("DADOS:", allData[0]);

    fillFilters();
    renderData();

  } catch(e) {
    document.getElementById("dataContainer").innerHTML = "Erro ao carregar";
  }

  showLoading(false);
}

function fillFilters() {
  const viaturas = [...new Set(allData.map(i => norm(i["tipo viatura"])).filter(Boolean))];
  const tps = [...new Set(allData.map(i => norm(i["transportador"])).filter(Boolean))];

  const vSel = document.getElementById("filterViatura");
  const tSel = document.getElementById("filterTransportador");

  vSel.innerHTML = '<option value="">Todas</option>';
  tSel.innerHTML = '<option value="">Todos</option>';

  viaturas.forEach(v => vSel.innerHTML += `<option value="${v}">${v}</option>`);
  tps.forEach(t => tSel.innerHTML += `<option value="${t}">${t}</option>`);
}

function renderData() {

  const container = document.getElementById("dataContainer");
  container.innerHTML = "";

  const selV = norm(document.getElementById("filterViatura").value);
  const selT = norm(document.getElementById("filterTransportador").value);

  const todayStr = toLocalDateString(currentDate);

  const filtered = allData.filter(row => {

    const carga = row["data carga"];
    const d = parseDate(carga);

    if (!d) return false;

    const dStr = toLocalDateString(d);

    return (
      dStr === todayStr &&
      (!selV || norm(row["tipo viatura"]) === selV) &&
      (!selT || norm(row["transportador"]) === selT)
    );
  });

  console.log("DATA:", todayStr, "RESULTADOS:", filtered.length);

  if (!filtered.length) {
    container.innerHTML = "<p style='text-align:center'>Nenhum transporte para esta data</p>";
    return;
  }

  const cards = document.createElement("div");
  cards.className = "cards";

  filtered.forEach(r => {
    const c = document.createElement("div");
    c.className = "card";

    const tipo = norm(r["tipo viatura"]);

    if (tipo === "basculante") c.style.background = "var(--basc)";
    if (tipo === "cisterna") c.style.background = "var(--cis)";
    if (tipo === "semi-reboque") c.style.background = "var(--semi)";

    c.innerHTML = `
      <b>${r["cliente"] || ""}</b><br>
      ${r["transportador"] || ""}<br>
      ${r["tipo viatura"] || ""}<br>
      ${r["designação"] || ""}<br>
      Descarga: ${r["data descarga"] || ""}<br>
      <b>${r["destino"] || ""}</b>
    `;

    cards.appendChild(c);
  });

  container.appendChild(cards);
}

function changeDate(d) {
  currentDate.setDate(currentDate.getDate()+d);
  document.getElementById("datePicker").value = toLocalDateString(currentDate);
  renderData();
}

function today() {
  currentDate = new Date();
  document.getElementById("datePicker").value = toLocalDateString(currentDate);
  renderData();
}

function pickDate(v) {
  if (!v) return;
  const [y,m,d] = v.split("-");
  currentDate = new Date(y, m-1, d);
  renderData();
}

document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("datePicker").value = toLocalDateString(currentDate);
  loadData();
});
</script>

</body>
</html>
